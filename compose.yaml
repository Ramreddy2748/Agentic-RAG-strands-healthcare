services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentic-healthcare-rag:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RAG_INDEX_DIR: /app/.rag_index
      HF_HOME: /home/appuser/.cache/huggingface
      PRELOAD_MODELS: "true"
      MAX_CONCURRENT_REQUESTS: "1"
      LOG_LEVEL: INFO
    volumes:
      - ./.rag_index:/app/.rag_index:ro
      - huggingface-cache:/home/appuser/.cache/huggingface
    restart: unless-stopped

volumes:
  huggingface-cache:
